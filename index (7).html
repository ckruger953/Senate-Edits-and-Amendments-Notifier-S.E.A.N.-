<script>
  firebase.initializeApp({apiKey:"AIzaSyCyP_LKTH0rtAC0N0Qi1EVnTsexe2OotqE",authDomain:"sean-41a57.firebaseapp.com",databaseURL:"https://sean-41a57-default-rtdb.firebaseio.com",projectId:"sean-41a57",storageBucket:"sean-41a57.firebasestorage.app",messagingSenderId:"823202231648",appId:"1:823202231648:web:1d8caeb3fab1229cb99a05",measurementId:"G-V1W56T90V3"});
  const db=firebase.database();

<script type="text/babel">
const{useState,useEffect,useRef}=React;

const QUOTES=[
  {text:"Live free or die: Death is not the worst of evils.",author:"Gen. John Stark, 1809"},
  {text:"Liberty and Union, now and for ever, one and inseparable!",author:"Daniel Webster, Second Reply to Hayne, 1830"},
  {text:"The Constitution was made to guard the people against the dangers of good intentions.",author:"Daniel Webster"},
  {text:"God grants liberty only to those who love it and are always ready to guard and defend it.",author:"Daniel Webster"},
  {text:"Up in the Mountains of New Hampshire, God Almighty has hung out a sign to show that there He makes men.",author:"Daniel Webster"},
  {text:"The proper function of a government is to make it easy for the people to do good, and difficult for them to do evil.",author:"Daniel Webster"},
  {text:"You have summoned me in my weakness. You must sustain me by your strength.",author:"Franklin Pierce, Inaugural Address, 1853"},
  {text:"The storm of frenzy and faction must inevitably dash itself in vain against the unshaken rock of the Constitution.",author:"Franklin Pierce"},
  {text:"If all my possessions were taken from me with one exception, I would choose to keep the power of communication, for by it I would soon regain all the rest.",author:"Daniel Webster"},
  {text:"Our destruction, should it come at all, will be from the inattention of the people to the concerns of their government.",author:"Daniel Webster"},
  {text:"Hold on to the Constitution, for if the American Constitution should fail, there will be anarchy throughout the world.",author:"Daniel Webster"},
  {text:"The position pays just $100 per year plus mileage.",author:"On the NH House — the fourth-largest legislative body in the English-speaking world"},
  {text:"I'm from the government, and I'm here to help.",author:"Ronald Reagan — 'The nine most terrifying words in the English language'"},
  {text:"Two roads diverged in a wood, and I — I took the one less traveled by, and that has made all the difference.",author:"Robert Frost, NH Poet Laureate"},
  {text:"The people's government, made for the people, made by the people, and answerable to the people.",author:"Daniel Webster, 1830 — later echoed by Lincoln"},
  {text:"The House Republican answer to income tax has not changed. Our answer is still HELL NO.",author:"Majority Leader Jason Osborne (R-Auburn)"},
  {text:"There's these two magic words that get thrown around: local control. As if that's a thing or a value that we have in New Hampshire, which we don't.",author:"Majority Leader Jason Osborne (R-Auburn), The Granite Discourse"},
  {text:"Obviously, I know where I've come from. I used to be a radical dude. And part of the reason I have this job is because look: 'If this guy can change, then anybody can.'",author:"Majority Leader Jason Osborne (R-Auburn)"},
  {text:"House Republicans will never ever support an income tax. We are focused on delivering real relief, not picking your pocket.",author:"Deputy Majority Leader Joe Sweeney (R-Salem)"},
  {text:"I've found Jason Osborne to be a pompous ass.",author:"Rep. Timothy Horrigan (D-Durham)"},
];

function getRandomQuote(){return QUOTES[Math.floor(Math.random()*QUOTES.length)]}

const fire={
  onValue(k,cb){const r=db.ref(`sean/${k}`);r.on("value",s=>cb(s.val()));return()=>r.off("value")},
  async set(k,v){try{await db.ref(`sean/${k}`).set(v);return true}catch(e){return null}}
};

function parseDocket(raw){return raw.split("\n").filter(l=>l.trim()).map(line=>{const p=line.split("|");if(p.length<6)return null;return{sessionYear:p[0]?.trim(),lsr:p[1]?.trim(),dateStr:p[2]?.trim(),billNo:p[3]?.trim(),body:p[4]?.trim(),description:p[5]?.trim()}}).filter(Boolean)}
function parseLSR(raw){const L={};raw.split("\n").filter(l=>l.trim()).forEach(line=>{const p=line.split("|");if(p.length<5)return;const sy=p[0]?.trim(),lsr=p[1]?.trim(),title=p[2]?.trim();let bn="";for(let i=3;i<Math.min(p.length,15);i++){const v=p[i]?.trim();if(v&&/^(HB|SB|HR|SR|HCR|SCR|CACR)\s*\d+/i.test(v)){bn=v.replace(/\s+/g,"").toUpperCase();break}}L[`${sy}-${lsr}`]={sessionYear:sy,lsr,title,billNo:bn}});return L}
function extractAmendNums(d){const m=d.match(/#\s*(\d{4}-\d{4,5}[a-z]?)/gi);return m?m.map(x=>x.replace(/#\s*/,"")):[]}
function isAmendAction(d){if(!d)return false;const l=d.toLowerCase();return l.includes("amendment")||l.includes("ought to pass with")||l.includes("otp-a")||l.includes("otp/a")||l.includes("concur")||l.includes("nonconcur")}
function extractComm(d){const m=d.match(/[Rr]eferred to ([^;]+)/);if(m)return m[1].replace(/\s+HJ\s+\d+.*$/,"").replace(/\s+SJ\s+\d+.*$/,"").replace(/\s+P\.\s*\d+.*$/,"").trim();return null}
function dateIs2026(d){if(!d)return false;const m=d.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);return m&&parseInt(m[3])>=2026}
function fmtDate(d){if(!d)return"";const m=d.match(/(\d{1,2}\/\d{1,2}\/\d{4})/);return m?m[1]:d.split(" ")[0]||d}
function timeAgo(d){if(!d)return"";const ms=Date.now()-new Date(d).getTime(),min=Math.floor(ms/60000);if(min<60)return`${min}m ago`;const h=Math.floor(min/60);if(h<24)return`${h}h ago`;return`${Math.floor(h/24)}d ago`}
function parseDateSort(d){const p=(d||"").split("/");return p.length===3?new Date(p[2],p[0]-1,p[1]):new Date(0)}
function billNumSort(a,b){return(parseInt((a.billNumber||"").replace(/\D/g,""))||0)-(parseInt((b.billNumber||"").replace(/\D/g,""))||0)}

function BillCard({bill,isNew}){
  const[exp,setExp]=useState(false);const la=bill.senateActions?.[0];
  return(<div style={{...S.card,borderLeft:isNew?"4px solid #c0392b":"4px solid #2c3e50",animation:isNew?"slideIn 0.4s ease-out":"none"}}>
    <div style={S.cardHeader} onClick={()=>setExp(!exp)}>
      <div style={S.cardHeaderLeft}>{isNew&&<span style={S.newBadge}>NEW</span>}<span style={S.billNumber}>{bill.billNumber}</span>{la&&<span style={S.dateChip}>{la.date}</span>}</div>
      <span style={S.expandIcon}>{exp?"▾":"▸"}</span>
    </div>
    {bill.title&&<p style={S.introDesc}>{bill.title}</p>}
    <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"8px"}}>
      {bill.houseCommittee&&<span style={S.commChip}><span style={{color:"#4299e1",marginRight:"4px"}}>H</span>{bill.houseCommittee}</span>}
      {bill.senateCommittee&&<span style={S.commChip}><span style={{color:"#e74c3c",marginRight:"4px"}}>S</span>{bill.senateCommittee}</span>}
    </div>
    {la&&<div style={S.latestAction}><span style={S.senateTag}>SENATE</span><span style={S.actionText}>{la.description}</span></div>}
    {(bill.amendmentNumbers||[]).length>0&&<div style={S.amendRow}>
      {bill.amendmentNumbers.map(n=><a key={n} href={`https://gc.nh.gov/bill_status/results.aspx?adv=2&txtbillno=${bill.billNumber}`} target="_blank" rel="noopener noreferrer" style={{...S.amendLink,cursor:"pointer",color:"#e2e8f0",textDecoration:"underline",textDecorationColor:"rgba(192,57,43,0.4)",textUnderlineOffset:"2px"}}>📄 #{n}</a>)}
    </div>}
    {exp&&<div style={S.expandedSection}>
      <div style={S.expandedTitle}>ALL SENATE ACTIONS</div>
      {(bill.senateActions||[]).map((a,i)=><div key={i} style={S.actionRow}><span style={S.actionDate}>{a.date}</span><span style={S.actionDesc}>{a.description}</span></div>)}
      <div style={{marginTop:"10px"}}><a href={`https://gc.nh.gov/bill_status/results.aspx?adv=2&txtbillno=${bill.billNumber}`} target="_blank" rel="noopener noreferrer" style={S.gcLink}>View {bill.billNumber} on gc.nh.gov →</a></div>
    </div>}
  </div>);
}

function DataInputModal({onClose,onProcess}){
  const[step,setStep]=useState(1);const[dT,setDT]=useState("");const[lT,setLT]=useState("");const[proc,setProc]=useState(false);
  const go=()=>{setProc(true);setTimeout(()=>{onProcess(dT,lT);setProc(false)},100)};
  return(<div style={S.modalOverlay}><div style={S.modal}>
    <div style={S.modalHeader}><h2 style={S.modalTitle}><span style={{color:"#c0392b"}}>⇧</span> REFRESH DATA</h2><button onClick={onClose} style={S.modalClose}>✕</button></div>
    {step===1?<div style={S.modalBody}>
      <div style={S.stepInd}><span style={S.stepA}>① DOCKET</span><span style={S.stepI}>② LSR TABLE</span></div>
      <div style={S.instr}><p style={S.iT}><strong>1.</strong> Open <a href="https://gc.nh.gov/dynamicdatadump" target="_blank" rel="noopener noreferrer" style={S.iL}>gc.nh.gov/dynamicdatadump</a></p><p style={S.iT}><strong>2.</strong> Click <strong>"Docket"</strong></p><p style={S.iT}><strong>3.</strong> <code style={S.code}>Ctrl+A</code> then <code style={S.code}>Ctrl+C</code></p><p style={S.iT}><strong>4.</strong> Paste below:</p></div>
      <textarea style={S.pasteBox} placeholder="Paste Docket data here..." value={dT} onChange={e=>setDT(e.target.value)} spellCheck={false}/>
      <div style={S.pCt}>{dT?`${dT.split("\n").filter(l=>l.trim()).length.toLocaleString()} lines`:"Waiting for paste..."}</div>
      <button onClick={()=>setStep(2)} disabled={!dT.trim()} style={{...S.nextBtn,opacity:dT.trim()?1:.4}}>Next: LSR Table →</button>
    </div>:<div style={S.modalBody}>
      <div style={S.stepInd}><span style={S.stepD}>✓ DOCKET</span><span style={S.stepA}>② LSR TABLE</span></div>
      <div style={S.instr}><p style={S.iT}><strong>1.</strong> Go back to <a href="https://gc.nh.gov/dynamicdatadump" target="_blank" rel="noopener noreferrer" style={S.iL}>Dynamic Data Files</a></p><p style={S.iT}><strong>2.</strong> Click <strong>"LSR Table"</strong></p><p style={S.iT}><strong>3.</strong> <code style={S.code}>Ctrl+A</code> then <code style={S.code}>Ctrl+C</code></p><p style={S.iT}><strong>4.</strong> Paste below:</p></div>
      <textarea style={S.pasteBox} placeholder="Paste LSR Table data here..." value={lT} onChange={e=>setLT(e.target.value)} spellCheck={false}/>
      <div style={S.pCt}>{lT?`${lT.split("\n").filter(l=>l.trim()).length.toLocaleString()} lines`:"Waiting for paste..."}</div>
      <div style={S.btnRow}><button onClick={()=>setStep(1)} style={S.backBtn}>← Back</button><button onClick={go} disabled={!lT.trim()||proc} style={{...S.processBtn,opacity:lT.trim()&&!proc?1:.4}}>{proc?"Processing...":"⚡ Process & Update S.E.A.N."}</button></div>
    </div>}
  </div></div>);
}

function SEAN(){
  const[bills,setBills]=useState([]);const[newIds,setNewIds]=useState(new Set());
  const[lastUp,setLastUp]=useState(null);const[total,setTotal]=useState(0);
  const[filterText,setFilterText]=useState("");const[fHC,setFHC]=useState("All");const[fSC,setFSC]=useState("All");
  const[sortBy,setSortBy]=useState("date-desc");const[loading,setLoading]=useState(true);const[showInput,setShowInput]=useState(false);const[connected,setConnected]=useState(false);
  const seenRef=useRef(new Set());const initRef=useRef(true);const[quote]=useState(()=>getRandomQuote());

  useEffect(()=>{
    const unsub=fire.onValue("billData",val=>{
      setConnected(true);if(!val){setLoading(false);return}
      try{const p=typeof val==="string"?JSON.parse(val):val;const bl=p.bills||[];setBills(bl);setLastUp(p.updatedAt||null);setTotal(bl.length);
        if(initRef.current){for(const b of bl)seenRef.current.add(`${b.billNumber}__${(b.amendmentNumbers||[]).join(",")}`);initRef.current=false}
        else{const ni=new Set();for(const b of bl){const k=`${b.billNumber}__${(b.amendmentNumbers||[]).join(",")}`;if(!seenRef.current.has(k)){ni.add(b.billNumber);seenRef.current.add(k)}}if(ni.size>0)setNewIds(ni)}
      }catch(e){console.error(e)}setLoading(false)});
    const cRef=db.ref(".info/connected");cRef.on("value",s=>setConnected(!!s.val()));
    return()=>{unsub();cRef.off()};
  },[]);

  const processData=async(dR,lR)=>{
    const allD=parseDocket(dR),lsrL=parseLSR(lR);
    const hbSA=allD.filter(e=>e.billNo&&e.billNo.toUpperCase().startsWith("HB")&&e.body==="S"&&isAmendAction(e.description)&&dateIs2026(e.dateStr));
    const qBills=new Set(hbSA.map(e=>e.billNo.toUpperCase()));
    const allForQ=allD.filter(e=>qBills.has((e.billNo||"").toUpperCase()));
    const bMap={};
    for(const e of allForQ){const bn=e.billNo.toUpperCase();
      if(!bMap[bn]){const li=lsrL[`${e.sessionYear}-${e.lsr}`];bMap[bn]={billNumber:bn,lsr:e.lsr,sessionYear:e.sessionYear,title:li?.title||"",senateActions:[],amendmentNumbers:[],houseCommittee:null,senateCommittee:null}}
      const d=e.description||"";
      if(d.toLowerCase().includes("referred to")||d.toLowerCase().includes("and referred to")){const c=extractComm(d);if(c){if(e.body==="H"&&!bMap[bn].houseCommittee)bMap[bn].houseCommittee=c;if(e.body==="S"&&!bMap[bn].senateCommittee)bMap[bn].senateCommittee=c}}
      if(e.body==="S"&&isAmendAction(d)&&dateIs2026(e.dateStr)){bMap[bn].senateActions.push({date:fmtDate(e.dateStr),description:d});for(const n of extractAmendNums(d))if(!bMap[bn].amendmentNumbers.includes(n))bMap[bn].amendmentNumbers.push(n)}}
    const bList=Object.values(bMap).sort((a,b)=>parseDateSort(b.senateActions[0]?.date)-parseDateSort(a.senateActions[0]?.date));
    const ni=new Set();for(const b of bList){const k=`${b.billNumber}__${b.amendmentNumbers.join(",")}`;if(!seenRef.current.has(k)){ni.add(b.billNumber);seenRef.current.add(k)}}
    await fire.set("billData",JSON.stringify({bills:bList,updatedAt:new Date().toISOString()}));setNewIds(ni);setShowInput(false);
  };

  const hComms=[...new Set(bills.map(b=>b.houseCommittee).filter(Boolean))].sort();
  const sComms=[...new Set(bills.map(b=>b.senateCommittee).filter(Boolean))].sort();
  let filtered=bills.filter(b=>{
    if(filterText){const q=filterText.toLowerCase();if(!(b.billNumber||"").toLowerCase().includes(q)&&!(b.title||"").toLowerCase().includes(q)&&!(b.senateActions||[]).some(a=>(a.description||"").toLowerCase().includes(q)))return false}
    if(fHC!=="All"&&b.houseCommittee!==fHC)return false;if(fSC!=="All"&&b.senateCommittee!==fSC)return false;return true});
  if(sortBy==="date-desc")filtered.sort((a,b)=>parseDateSort(b.senateActions[0]?.date)-parseDateSort(a.senateActions[0]?.date));
  else if(sortBy==="date-asc")filtered.sort((a,b)=>parseDateSort(a.senateActions[0]?.date)-parseDateSort(b.senateActions[0]?.date));
  else if(sortBy==="bill-asc")filtered.sort(billNumSort);
  else if(sortBy==="bill-desc")filtered.sort((a,b)=>billNumSort(b,a));
  const newCt=filtered.filter(b=>newIds.has(b.billNumber)).length;

  return(<div style={S.container}><div style={S.bgPattern}/>
    <header style={S.header}>
      <div style={S.titleRow}><div>
        <div style={{display:"flex",alignItems:"center",gap:"16px"}}>
          <h1 style={S.title}><span style={S.accent}>S</span>.<span style={S.accent}>E</span>.<span style={S.accent}>A</span>.<span style={S.accent}>N</span>.</h1>
          <div style={{display:"flex",alignItems:"center",gap:"6px",fontFamily:"'IBM Plex Mono',monospace",fontSize:"10px",color:connected?"#27ae60":"#e74c3c",letterSpacing:".5px"}}><span style={{width:6,height:6,borderRadius:"50%",background:connected?"#27ae60":"#e74c3c",display:"inline-block",animation:connected?"pulse 3s ease-in-out infinite":"none"}}/>{connected?"LIVE SYNC":"OFFLINE"}</div>
        </div>
        <p style={S.titleFull}>Senate Edits & Amendments Notifier</p>
        <p style={S.subtitle}>NH General Court — Republican House Majority Office — 2026 Session</p>
      </div><button onClick={()=>setShowInput(true)} style={S.refreshBtn}>⟳ Refresh Data</button></div>
      <div style={{margin:"16px 0 20px",padding:"14px 20px",background:"rgba(255,255,255,0.02)",borderLeft:"3px solid rgba(192,57,43,0.4)",borderRadius:"0 6px 6px 0",animation:"fadeQuote 0.8s ease-out"}}>
        <p style={{fontFamily:"'IBM Plex Sans',sans-serif",fontStyle:"italic",fontSize:"13px",color:"#a0aec0",lineHeight:1.6,margin:0}}>"{quote.text}"</p>
        <p style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:"10px",color:"#4a5568",marginTop:"6px",letterSpacing:".5px"}}>— {quote.author}</p>
      </div>
      <div style={S.statsRow}>
        <div style={S.statBox}><div style={S.statNumber}>{total}</div><div style={S.statLabel}>HBs w/ Senate Amendments</div></div>
        <div style={{...S.statBox,background:newCt>0?"rgba(192,57,43,0.15)":undefined}}><div style={{...S.statNumber,color:newCt>0?"#c0392b":undefined}}>{newCt}</div><div style={S.statLabel}>New Since Last Check</div></div>
        {lastUp&&<div style={S.statBox}><div style={S.statMeta}>Updated: {timeAgo(lastUp)}</div></div>}
      </div>
    </header>
    {bills.length>0&&<div style={S.toolbar}>
      <input type="text" placeholder="Search bills..." value={filterText} onChange={e=>setFilterText(e.target.value)} style={S.filterInput}/>
      <select value={fHC} onChange={e=>setFHC(e.target.value)} style={S.selectFilter}><option value="All">House Comm: All</option>{hComms.map(c=><option key={c} value={c}>{c}</option>)}</select>
      <select value={fSC} onChange={e=>setFSC(e.target.value)} style={S.selectFilter}><option value="All">Senate Comm: All</option>{sComms.map(c=><option key={c} value={c}>{c}</option>)}</select>
      <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={S.selectFilter}><option value="date-desc">Sort: Newest First</option><option value="date-asc">Sort: Oldest First</option><option value="bill-asc">Sort: Bill # (Low→High)</option><option value="bill-desc">Sort: Bill # (High→Low)</option></select>
      {newCt>0&&<button onClick={()=>setNewIds(new Set())} style={S.clearBtn}>Mark all seen</button>}
    </div>}
    <div style={{position:"relative",zIndex:1,padding:"0 32px 4px",fontFamily:"'IBM Plex Mono',monospace",fontSize:"11px",color:"#4a5568"}}>{bills.length>0&&`Showing ${filtered.length} of ${bills.length} bills`}</div>
    <div style={S.cardGrid}>
      {loading&&bills.length===0&&<div style={S.emptyState}>Connecting to Firebase...</div>}
      {!loading&&bills.length===0&&<div style={S.emptyState}><div style={{fontSize:"48px",marginBottom:"16px"}}>📋</div><div style={S.emptyTitle}>No data yet</div><div style={S.emptyDesc}>Click <strong>⟳ Refresh Data</strong> to paste data from gc.nh.gov</div><button onClick={()=>setShowInput(true)} style={S.emptyBtn}>⟳ Load Data Now</button></div>}
      {filtered.map(bill=><BillCard key={bill.billNumber} bill={bill} isNew={newIds.has(bill.billNumber)}/>)}
    </div>
    <footer style={S.footer}>S.E.A.N. v3.3 — Live sync via Firebase — Data from gc.nh.gov/dynamicdatadump — 2026 Session</footer>
    {showInput&&<DataInputModal onClose={()=>setShowInput(false)} onProcess={processData}/>}
  </div>);
}

const S={
  container:{fontFamily:"'IBM Plex Sans',sans-serif",background:"#0f1118",color:"#e2e8f0",minHeight:"100vh",position:"relative",overflow:"auto"},
  bgPattern:{position:"fixed",top:0,left:0,right:0,bottom:0,backgroundImage:"radial-gradient(circle at 20% 50%,rgba(192,57,43,0.04) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(44,62,80,0.08) 0%,transparent 50%)",pointerEvents:"none",zIndex:0},
  header:{position:"relative",zIndex:1,padding:"28px 32px 20px",borderBottom:"1px solid rgba(255,255,255,0.06)",background:"linear-gradient(180deg,rgba(15,17,24,1) 0%,rgba(15,17,24,0.95) 100%)"},
  titleRow:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:"16px"},
  title:{fontFamily:"'IBM Plex Mono',monospace",fontSize:"32px",fontWeight:700,letterSpacing:"3px",margin:0,color:"#e2e8f0"},accent:{color:"#c0392b"},
